services:
  postgres:
    image: postgres:17
    container_name: timesheet_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-timesheet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - timesheet_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: timesheet_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - timesheet_network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: timesheet_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - timesheet_network

  telegram_bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: timesheet_telegram_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - timesheet_network

volumes:
  postgres_data:

networks:
  timesheet_network:
    driver: bridge
