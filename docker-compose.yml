services:
  postgres:
    image: postgres:17
    container_name: timesheet_postgres
    restart: unless-stopped
    cpus: 0.5
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timesheet_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-timesheet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - timesheet_network
    deploy:
      resources:
        limits:
          cpus: "0.5"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: timesheet_backend
    restart: unless-stopped
    cpus: 0.5
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8010:8000"
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:5180,http://127.0.0.1:5180
      BACKEND_CORS_ORIGIN_REGEX: http://.*:5180
    networks:
      - timesheet_network
    deploy:
      resources:
        limits:
          cpus: "0.5"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: timesheet_frontend
    restart: unless-stopped
    cpus: 0.5
    depends_on:
      - backend
    ports:
      - "5180:5180"
    networks:
      - timesheet_network
    deploy:
      resources:
        limits:
          cpus: "0.5"

  telegram_bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: timesheet_telegram_bot
    restart: unless-stopped
    cpus: 0.5
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - timesheet_network
    deploy:
      resources:
        limits:
          cpus: "0.5"

volumes:
  postgres_data:

networks:
  timesheet_network:
    driver: bridge
